# NOTE: This file should be named prek.toml but Renovate does not support it yet.
repos:
  - repo: builtin
    hooks:
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: check-case-conflict
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: check-json
      - id: check-json5
      - id: check-toml
      - id: check-yaml
        args:
          - --allow-multiple-documents
      - id: check-xml
      - id: mixed-line-ending
      - id: check-symlinks
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-executables-have-shebangs

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # frozen: v6.0.0
    hooks:
      - id: check-ast
      - id: check-shebang-scripts-are-executable
      - id: requirements-txt-fixer

  - repo: meta
    hooks:
      - id: check-useless-excludes

  - repo: https://github.com/gitleaks/gitleaks
    rev: 83d9cd684c87d95d656c1458ef04895a7f1cbd8e # frozen: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/codespell-project/codespell
    rev: 2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a # frozen: v2.4.2
    hooks:
      - id: codespell
        exclude: \.svg

  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca # frozen: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: 745eface02aef23e168a8afb6b5737818efbea95 # frozen: v0.11.0.1
    hooks:
      - id: shellcheck

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 3b3f7c3f57fe9925356faf5fe6230835138be230 # frozen: v0.15.17
    hooks:
      - id: ruff-check
        args:
          - --fix
      - id: ruff-format

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: fe063293315003e95dff96d43c4928f8799a5c62 # frozen: 0.11.21
    hooks:
      - id: uv-lock

  - repo: https://github.com/ansible/ansible-lint
    rev: 5fac056c45595896c973fbde871f01f6cb14d74c # frozen: v26.4.0
    hooks:
      - id: ansible-lint

  - repo: https://github.com/hadolint/hadolint
    rev: 57e1618d78fd469a92c1e584e8c9313024656623 # frozen: v2.14.0
    hooks:
      - id: hadolint-docker

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: 996abf60411a8d954288ac9856aae7602b80cbda # frozen: v0.22.1
    hooks:
      - id: markdownlint-cli2

  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: 0ea30826501998d088c4492b1243e03bfa601e6f # frozen: 43.218.0
    hooks:
      - id: renovate-config-validator
        args: [--strict]
